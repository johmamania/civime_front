<h2 mat-dialog-title class="dialog-title">Acceso administrador</h2>

<div mat-dialog-content class="dialog-body">
  @if (errorMsg) {
    <p class="dialog-error">{{ errorMsg }}</p>
  }

  <mat-form-field appearance="outline" class="full">
    <mat-label>Usuario (email)</mat-label>
    <input
      matInput
      [(ngModel)]="usuario"
      name="usuario"
      type="email"
      autocomplete="username"
      placeholder="admin@dominio.com" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Contraseña</mat-label>
    <input
      matInput
      [(ngModel)]="password"
      name="password"
      type="password"
      autocomplete="current-password"
      placeholder="••••••••"
      (keyup.enter)="login()" />
  </mat-form-field>
</div>

<div mat-dialog-actions class="dialog-actions">
  <button mat-button type="button" (click)="cerrar()" [disabled]="loading">
    Cancelar
  </button>
  <button mat-flat-button color="primary" type="button" (click)="login()" [disabled]="loading">
    {{ loading ? 'Ingresando...' : 'Ingresar' }}
  </button>
</div>
