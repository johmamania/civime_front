<h2 mat-dialog-title>Detalle del curso</h2>

<div mat-dialog-content class="detalle-dialog-body">
  @if (loading) {
    <p class="detalle-loading">Cargando detalle...</p>
  } @else if (error) {
    <p class="detalle-error">{{ error }}</p>
  } @else if (curso) {
    <img
      class="detalle-img"
      [src]="imagenCurso()"
      [alt]="curso.titulo"
      loading="lazy" />
    <h3 class="detalle-titulo">{{ curso.titulo }}</h3>
    <p class="detalle-descripcion">{{ curso.descripcion }}</p>
  }
</div>

<div mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="cerrar()">Cerrar</button>
</div>
