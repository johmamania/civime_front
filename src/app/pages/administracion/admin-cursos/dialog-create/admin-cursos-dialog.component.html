<h2 mat-dialog-title>{{ editando ? 'Editar curso' : 'Agregar curso' }}</h2>

<div mat-dialog-content class="dialog-body">
  @if (errorMsg) {
    <p class="dialog-error">{{ errorMsg }}</p>
  }

  <mat-form-field appearance="outline" class="full">
    <mat-label>Título</mat-label>
    <input matInput [(ngModel)]="titulo" name="tituloCursoDialog" autocomplete="off" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Descripción</mat-label>
    <textarea
      matInput
      rows="3"
      [(ngModel)]="descripcion"
      name="descripcionCursoDialog"></textarea>
  </mat-form-field>



  <mat-form-field appearance="outline" class="full">
    <mat-label>Choose a date</mat-label>
    <input matInput [matDatepicker]="picker" name="fechaAperturaCursoDialog">
    <mat-hint>MM/DD/YYYY</mat-hint>
    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>

  <mat-checkbox [(ngModel)]="estado" name="estadoCursoDialog">Activo</mat-checkbox>

  <div class="file-row">
    <label class="file-label">
      <span class="file-btn">Elegir imagen</span>
      <input
        type="file"
        accept="image/jpeg,image/png,image/gif,image/webp"
        (change)="onFile($event)" />
    </label>
    <span class="file-name">
      {{ archivo?.name || (editando ? 'Mantener imagen actual' : 'Ningún archivo') }}
    </span>
  </div>
</div>

<div mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cerrar()" [disabled]="saving">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="guardar()" [disabled]="saving">
    {{ saving ? 'Guardando...' : (editando ? 'Actualizar' : 'Guardar') }}
  </button>
</div>
